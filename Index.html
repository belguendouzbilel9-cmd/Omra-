<!DOCTYPE html>

<!-- واتساب وتيليغرام -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="وكالة عمر للسياحة والأسفار — وهران">
<meta name="twitter:description" content="عروض عمرة مميزة من وهران — رحلات مباشرة · فنادق قريبة من الحرم · خدمة متكاملة">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#8A6E2F;--green-mid:#C9A84C;--green-soft:#b8942a;
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8A6E2F;
  --dark:#fff;--dark-mid:#faf7f2;--dark-soft:#f5f0e8;
  --cream:#F8F5EF;--cream-dark:#EDE8DC;
  --text:#1a1208;--text-soft:#4a3a10;
}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:#fff;color:var(--text);overflow-x:hidden}

/* ===== NAV ===== */
nav{position:fixed;top:0;width:100%;z-index:300;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:68px;border-bottom:1px solid rgba(201,168,76,0.3);transition:height 0.3s;box-shadow:0 2px 20px rgba(201,168,76,0.1)}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(201,168,76,0.3);flex-shrink:0}
.logo-text strong{display:block;font-size:1rem;font-weight:900;color:var(--text);line-height:1.2}
.logo-text span{font-size:0.68rem;color:var(--gold-dim);font-weight:400}
.nav-links{display:flex;gap:26px;list-style:none}
.nav-links a{color:var(--text-soft);text-decoration:none;font-size:0.88rem;font-weight:600;transition:color 0.2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;right:0;width:0;height:2px;background:var(--gold);transition:width 0.3s}
.nav-links a:hover{color:var(--gold-dim)}
.nav-links a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:26px;height:2px;background:var(--gold);border-radius:2px}

/* ===== HERO ===== */
.hero{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:90px 5% 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:
  linear-gradient(to bottom,rgba(255,248,220,0.55) 0%,rgba(255,245,200,0.35) 40%,rgba(255,248,220,0.88) 100%),
  url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?w=1600&q=80') center/cover no-repeat;z-index:0}
.hero-content{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.5);color:var(--gold-dim);padding:7px 22px;border-radius:30px;font-size:0.78rem;letter-spacing:2px;font-weight:700;margin-bottom:24px;animation:fadeUp 0.7s ease both}
.hero h1{font-family:'Amiri',serif;font-size:clamp(2.2rem,6vw,4.8rem);color:var(--text);line-height:1.25;margin-bottom:16px;animation:fadeUp 0.8s 0.1s ease both;text-shadow:0 2px 12px rgba(255,255,255,0.8)}
.hero h1 span{color:var(--gold-dim)}
.hero-sub{color:var(--text-soft);font-size:clamp(1rem,2vw,1.18rem);max-width:600px;line-height:1.9;margin:0 auto 16px;animation:fadeUp 0.9s 0.2s ease both}
.hero-location{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.7);border:1px solid rgba(201,168,76,0.3);padding:7px 18px;border-radius:30px;font-size:0.82rem;color:var(--text-soft);margin-bottom:36px;animation:fadeUp 1s 0.25s ease both}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fadeUp 1s 0.3s ease both}
.btn-green{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#fff;padding:13px 32px;border-radius:9px;font-size:0.96rem;font-weight:700;text-decoration:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:inline-flex;align-items:center;gap:8px;transition:transform 0.2s,box-shadow 0.2s}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.45)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;padding:13px 32px;border-radius:9px;font-size:0.96rem;font-weight:800;text-decoration:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:inline-flex;align-items:center;gap:8px;transition:transform 0.2s,box-shadow 0.2s}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.5)}

/* Hero stats bar */
.hero-stats{width:100%;background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(232,201,122,0.08));backdrop-filter:blur(12px);border:1px solid rgba(201,168,76,0.25);display:flex;justify-content:center;flex-wrap:wrap;margin-top:48px;border-radius:14px}
.stat{padding:18px 42px;text-align:center;border-left:1px solid rgba(201,168,76,0.15)}
.stat:last-child{border-left:none}
.stat-num{display:block;font-size:1.65rem;font-weight:900;color:var(--gold-dim);line-height:1}
.stat-lbl{font-size:0.72rem;color:var(--text-soft);margin-top:4px;display:block}

/* ===== COMING SOON ===== */
.coming-section{background:#faf7f0;padding:80px 5%;scroll-margin-top:68px;border-top:1px solid rgba(201,168,76,0.15)}
.sec-label{font-size:0.7rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-dim);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sec-label::before{content:'';display:block;width:28px;height:2px;background:var(--gold)}
.sec-title{font-family:'Amiri',serif;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.3;margin-bottom:14px;color:var(--text)}
.sec-sub{color:var(--text-soft);font-size:0.98rem;max-width:540px;line-height:1.85;margin-bottom:46px}

.coming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.month-card{background:#fff;border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:20px 16px;text-align:center;transition:background 0.2s,border-color 0.2s,transform 0.2s;cursor:default;box-shadow:0 2px 10px rgba(201,168,76,0.06)}
.month-card:hover{background:rgba(201,168,76,0.05);border-color:var(--gold);transform:translateY(-3px)}
.month-card.ramadan{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.15));border-color:rgba(201,168,76,0.4)}
.month-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.month-name{font-size:0.92rem;font-weight:700;color:var(--text);margin-bottom:4px}
.month-tag{font-size:0.68rem;color:var(--text-soft);font-weight:500}
.month-card.ramadan .month-name{color:var(--gold-dim)}
.month-card.ramadan .month-tag{color:var(--gold)}

.coming-cta{margin-top:36px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.coming-note{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:10px;padding:14px 20px;font-size:0.85rem;color:var(--text-soft);line-height:1.7;flex:1;min-width:240px}
.coming-note strong{color:var(--gold-dim)}

/* ===== CURRENT OFFER ===== */
.offer-section{background:#fff;padding:80px 5%;scroll-margin-top:68px;border-top:1px solid rgba(201,168,76,0.15)}

.offer-card{background:linear-gradient(160deg,rgba(201,168,76,0.06),rgba(255,255,255,0.9));border:1.5px solid rgba(201,168,76,0.3);border-radius:22px;overflow:hidden;max-width:960px;margin:0 auto;box-shadow:0 8px 40px rgba(201,168,76,0.12)}

/* Offer header */
.offer-head{background:linear-gradient(135deg,var(--gold-dim),var(--gold));padding:28px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.offer-head-left{display:flex;align-items:center;gap:16px}
.offer-emoji{font-size:2.8rem;line-height:1}
.offer-title-block{}
.offer-eyebrow{font-size:0.7rem;letter-spacing:2px;color:rgba(255,255,255,0.7);font-weight:700;margin-bottom:4px}
.offer-title{font-family:'Amiri',serif;font-size:1.8rem;color:#fff;font-weight:700;line-height:1.2}
.offer-subtitle{font-size:0.82rem;color:rgba(255,255,255,0.75);margin-top:3px}
.offer-days-badge{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:14px;padding:12px 22px;text-align:center;flex-shrink:0}
.offer-days-badge .num{font-size:2.4rem;font-weight:900;color:#fff;line-height:1;display:block}
.offer-days-badge .lbl{font-size:0.72rem;color:rgba(255,255,255,0.75);font-weight:700;display:block;margin-top:2px}

/* Offer info strip */
.offer-strip{display:flex;flex-wrap:wrap;gap:0;border-bottom:1px solid rgba(201,168,76,0.15);background:#fffdf7}
.strip-item{flex:1;min-width:160px;padding:16px 22px;border-left:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;gap:10px}
.strip-item:last-child{border-left:none}
.strip-icon{font-size:1.4rem;flex-shrink:0}
.strip-lbl{font-size:0.67rem;color:rgba(100,80,20,0.5);font-weight:700;letter-spacing:0.5px;margin-bottom:2px}
.strip-val{font-size:0.9rem;font-weight:700;color:var(--text);line-height:1.3}
.strip-val em{color:var(--gold-dim);font-style:normal}

/* Room prices */
.offer-body{padding:28px 32px;background:#fffdf7}
.offer-rooms-title{font-size:0.72rem;letter-spacing:1.5px;font-weight:800;color:var(--gold-dim);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.offer-rooms-title::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.2)}
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.room-card{background:#fff;border:1.5px solid rgba(201,168,76,0.2);border-radius:14px;padding:20px 18px;text-align:center;transition:border-color 0.2s,background 0.2s,transform 0.2s;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(201,168,76,0.08)}
.room-card:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);transform:translateY(-3px)}
.room-card.best{border-color:var(--gold);background:rgba(201,168,76,0.04)}
.room-best-tag{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;font-size:0.62rem;font-weight:900;padding:3px 14px;border-radius:0 0 8px 8px;letter-spacing:0.5px}
.room-icon{font-size:1.6rem;margin-bottom:10px;display:block}
.room-type{font-size:0.9rem;font-weight:800;color:var(--text);margin-bottom:4px}
.room-persons{font-size:0.72rem;color:var(--text-soft);margin-bottom:14px}
.room-price{font-size:1.5rem;font-weight:900;color:var(--gold-dim);line-height:1;display:block}
.room-price-unit{font-size:0.65rem;color:var(--text-soft);margin-top:2px;display:block}
.room-btn{margin-top:14px;width:100%;padding:9px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#fff;border:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.room-btn:hover{opacity:0.88;transform:scale(0.98)}

/* Services */
.offer-services{display:flex;flex-wrap:wrap;gap:10px;padding-top:22px;border-top:1px solid rgba(201,168,76,0.15);margin-bottom:24px}
.srv{display:flex;align-items:center;gap:6px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.18);border-radius:8px;padding:7px 12px;font-size:0.8rem;color:var(--text-soft)}
.srv span{color:var(--gold-dim)}

/* Prayer */
.offer-prayer{text-align:center;padding:16px 24px;background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(201,168,76,0.12));border-top:1px solid rgba(201,168,76,0.15);font-family:'Amiri',serif;font-size:1rem;color:var(--gold-dim);font-style:italic}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border:1px solid rgba(201,168,76,0.25);border-radius:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(201,168,76,0.15)}
.modal-head{background:linear-gradient(135deg,var(--gold-dim),var(--gold));padding:26px 26px 22px;border-radius:20px 20px 0 0;position:relative}
.modal-head h3{font-family:'Amiri',serif;font-size:1.45rem;color:#fff;margin-bottom:5px}
.modal-head p{font-size:0.8rem;color:rgba(255,255,255,0.7)}
.modal-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-close:hover{background:rgba(255,255,255,0.3)}
.modal-strip{margin:0 22px;margin-top:-14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:10px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
.ms-name{font-weight:800;color:#fff;font-size:0.88rem;max-width:65%}
.ms-price{font-size:1.05rem;font-weight:900;color:#fff;white-space:nowrap}
.modal-body{padding:20px 22px 24px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:0.8rem;font-weight:700;color:var(--text)}
.fg label .r{color:#e74c3c;margin-right:2px}
.fg input,.fg select{padding:11px 14px;border:1.5px solid rgba(201,168,76,0.25);border-radius:9px;font-family:'Tajawal',sans-serif;font-size:0.9rem;background:#faf7f0;color:var(--text);outline:none;transition:border-color 0.2s}
.fg input:focus,.fg select:focus{border-color:var(--gold);background:#fff}
.fg input::placeholder{color:rgba(100,80,20,0.35)}
.fg select option{background:#fff;color:var(--text)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.room-suggest{display:none;background:rgba(201,168,76,0.08);border:1.5px solid rgba(201,168,76,0.3);border-radius:10px;padding:13px 15px;margin-bottom:14px}
.room-suggest.show{display:block}
.rs-lbl{font-size:0.68rem;font-weight:800;color:var(--gold-dim);letter-spacing:0.5px;margin-bottom:4px}
.rs-val{font-size:0.97rem;font-weight:800;color:var(--text);margin-bottom:2px}
.rs-desc{font-size:0.75rem;color:var(--text-soft);line-height:1.5}
.wa-btn{width:100%;padding:14px;background:linear-gradient(135deg,#25D366,#1da851);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:0.98rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:transform 0.2s,box-shadow 0.2s;margin-top:4px}
.wa-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,211,102,0.35)}
.wa-btn:disabled{opacity:0.35;cursor:not-allowed}
.wa-hint{font-size:0.72rem;color:var(--text-soft);text-align:center;margin-top:9px}

/* ===== WHY ===== */
.why-section{background:#faf7f0;padding:80px 5%;scroll-margin-top:68px;border-top:1px solid rgba(201,168,76,0.15)}
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
.why-card{background:#fff;border:1px solid rgba(201,168,76,0.18);border-radius:14px;padding:26px 20px;text-align:center;transition:transform 0.3s,border-color 0.3s;box-shadow:0 2px 12px rgba(201,168,76,0.07)}
.why-card:hover{transform:translateY(-4px);border-color:var(--gold)}
.why-icon{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(201,168,76,0.22));border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 15px}
.why-card h3{font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:8px}
.why-card p{font-size:0.8rem;color:var(--text-soft);line-height:1.7}

/* ===== FOOTER ===== */
footer{background:linear-gradient(135deg,#faf7f0,#f5efe0);padding:48px 5% 24px;border-top:2px solid rgba(201,168,76,0.25)}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:44px;padding-bottom:34px;border-bottom:1px solid rgba(201,168,76,0.15);margin-bottom:22px}
.footer-brand p{font-size:0.83rem;line-height:1.85;color:var(--text-soft);margin-top:14px;max-width:250px}
.footer-col h4{color:var(--text);font-size:0.88rem;font-weight:700;margin-bottom:14px}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.footer-col a{color:var(--text-soft);text-decoration:none;font-size:0.82rem;transition:color 0.2s}
.footer-col a:hover{color:var(--gold-dim)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-bottom p{font-size:0.78rem;color:var(--text-soft)}
.socials{display:flex;gap:9px}
.soc{width:35px;height:35px;border-radius:8px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:0.9rem;transition:background 0.2s,border-color 0.2s}
.soc:hover{background:rgba(201,168,76,0.18);border-color:var(--gold)}

/* WA float */
.wa-float{position:fixed;bottom:24px;left:24px;z-index:400;background:#25D366;color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;text-decoration:none;box-shadow:0 6px 22px rgba(37,211,102,0.4);animation:wap 2.5s infinite;transition:transform 0.2s}
.wa-float:hover{transform:scale(1.1)}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes wap{0%,100%{box-shadow:0 6px 22px rgba(37,211,102,0.4)}50%{box-shadow:0 6px 34px rgba(37,211,102,0.65),0 0 0 8px rgba(37,211,102,0.08)}}

@media(max-width:860px){
  .rooms-grid{grid-template-columns:1fr 1fr !important}
  .footer-top{grid-template-columns:1fr}
  .strip-item{min-width:50%}
}
@media(max-width:720px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .nav-links.open{display:flex;flex-direction:column;position:absolute;top:68px;right:0;left:0;background:rgba(255,255,255,0.98);padding:20px 5%;border-top:1px solid rgba(201,168,76,0.2);z-index:100;box-shadow:0 8px 24px rgba(201,168,76,0.1)}
  .nav-links.open a{color:var(--text)}
  .offer-head{flex-direction:column;align-items:flex-start}
  .frow{grid-template-columns:1fr}
  .coming-grid{grid-template-columns:repeat(3,1fr)}
  .room-price{font-size:1.1rem !important}
  .room-type{font-size:0.82rem}
  .room-btn{font-size:0.75rem;padding:7px}
}
@media(max-width:420px){
  .coming-grid{grid-template-columns:repeat(2,1fr)}
  .stat{padding:14px 22px}
}
</style>
</head>
